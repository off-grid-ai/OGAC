# OTel Collector config — receives OTLP from the console's observability adapter and fans out
# to the permissive backends. One wire (OTLP) in; any backend out.
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch: {}

exporters:
  debug:
    verbosity: normal
  # Metrics → VictoriaMetrics (Prometheus remote-write endpoint).
  prometheusremotewrite:
    endpoint: http://victoriametrics:8428/api/v1/write
    tls:
      insecure: true
  # Traces → Jaeger (app-layer distributed tracing, queryable UI on :16686).
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlp/jaeger]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, prometheusremotewrite]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
