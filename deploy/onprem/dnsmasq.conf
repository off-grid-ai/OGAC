# Off Grid on-prem LAN DNS (runs on S1 = 192.168.1.84).
# Answers the Off Grid hostnames locally; forwards everything else upstream.
# These names exist ONLY here — they are never published to public DNS.

# upstream resolvers for everything that isn't ours
no-resolv
server=1.1.1.1
server=8.8.8.8

# our LAN-only records → the edge on S1
address=/onprem-console.getoffgridai.co/192.168.1.84
address=/local.getoffgridai.co/192.168.1.84

# hygiene
domain-needed
bogus-priv
no-hosts
log-queries
