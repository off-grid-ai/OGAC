# OpenSearch Dashboards — Keycloak OIDC frontend. Phase-D, READY not enabled.
# Mount at /usr/share/opensearch-dashboards/config/opensearch_dashboards.yml and remove
# DISABLE_SECURITY_DASHBOARDS_PLUGIN in services-node-a.yml. See oidc-services.md § 1b.
server.host: '0.0.0.0'
opensearch.hosts: ['https://opensearch:9200']
opensearch.ssl.verificationMode: none
opensearch_security.auth.type: 'openid'
opensearch_security.openid.connect_url: https://auth.getoffgridai.co/realms/offgrid/.well-known/openid-configuration
opensearch_security.openid.client_id: offgrid-opensearch
# Inject from OpenBao secret/opensearch/client-secret at deploy time (do not commit a real secret):
opensearch_security.openid.client_secret: '${OPENSEARCH_OIDC_CLIENT_SECRET}'
opensearch_security.openid.base_redirect_url: https://opensearch.getoffgridai.co
opensearch_security.openid.scope: 'openid profile email'
opensearch_security.cookie.secure: true
