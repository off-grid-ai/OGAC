# OpenSearch security-plugin authc config — Phase-D native OIDC + JWT (Keycloak).
# READY, NOT ENABLED. Mount at /usr/share/opensearch/config/opensearch-security/config.yml and remove
# DISABLE_SECURITY_PLUGIN in services-node-a.yml, then run securityadmin.sh. See oidc-services.md § 1.
_meta:
  type: 'config'
  config_version: 2
config:
  dynamic:
    authc:
      # ── OIDC: browser SSO into OpenSearch Dashboards ──
      openid_auth_domain:
        http_enabled: true
        transport_enabled: true
        order: 0
        http_authenticator:
          type: openid
          challenge: false
          config:
            subject_key: preferred_username
            roles_key: realm_access.roles
            openid_connect_url: https://auth.getoffgridai.co/realms/offgrid/.well-known/openid-configuration
        authentication_backend:
          type: noop
      # ── JWT: accept a Keycloak Bearer directly on the REST API (validated against realm JWKS) ──
      jwt_auth_domain:
        http_enabled: true
        transport_enabled: true
        order: 1
        http_authenticator:
          type: jwt
          challenge: false
          config:
            jwt_url: https://auth.getoffgridai.co/realms/offgrid/protocol/openid-connect/certs
            jwt_header: Authorization
            subject_key: preferred_username
            roles_key: realm_access.roles
            required_audience: offgrid-opensearch
            jwt_clock_skew_tolerance_seconds: 30
        authentication_backend:
          type: noop
      # Break-glass: keep internal basic auth so you're never locked out during cutover.
      basic_internal_auth_domain:
        http_enabled: true
        transport_enabled: true
        order: 2
        http_authenticator:
          type: basic
          challenge: true
        authentication_backend:
          type: internal
