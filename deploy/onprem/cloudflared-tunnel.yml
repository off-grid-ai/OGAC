# Canonical mirror of the LIVE cloudflared ingress on S1 (~/.cloudflared/config.yml).
# Keep in sync with the live file; copy over on change, then restart cloudflared (see NOTE below).
#
# IMPORTANT ORDERING: cloudflared matches ingress rules top-down, first match wins. Explicit
# hostnames MUST come before the wildcard, and the wildcard before the 404 catch-all.
#
# TENANT SUBDOMAINS: `<slug>-onprem-console.getoffgridai.co` are served by the `*.getoffgridai.co`
# wildcard → the console on :3000, which resolves the tenant from the Host header
# (middleware → x-offgrid-tenant-slug → currentOrgId). DNS: a wildcard `*.getoffgridai.co` proxied
# CNAME → the tunnel covers every tenant subdomain with no per-tenant DNS record.
tunnel: 00000000-0000-0000-0000-000000000000
credentials-file: /Users/admin/.cloudflared/00000000-0000-0000-0000-000000000000.json
ingress:
  - hostname: onprem-console.getoffgridai.co
    service: http://127.0.0.1:3000
  - hostname: auth.getoffgridai.co
    service: http://127.0.0.1:8080
  - hostname: ai.getoffgridai.co
    service: http://127.0.0.1:80
  - hostname: gateway.getoffgridai.co
    service: http://127.0.0.1:80
  - hostname: console-status.getoffgridai.co
    service: http://127.0.0.1:80
  - hostname: console-landing.getoffgridai.co
    service: http://127.0.0.1:80
  - hostname: gungnir.getoffgridai.co
    service: http://127.0.0.1:80
  - hostname: provit.getoffgridai.co
    service: http://127.0.0.1:80
  - hostname: ssh.example.internal
    service: ssh://localhost:22
  - hostname: console-api.getoffgridai.co
    service: http://127.0.0.1:80
  # STAGED (webhook ingress) — the public inbound-trigger surface. Routed through Caddy (:80) so it
  # gets the edge WAF + per-IP rate limit before the console; Caddy proxies ONLY /api/v1/triggers/*
  # to :3000 (see deploy/Caddyfile). NOT yet applied to the live ~/.cloudflared/config.yml — needs a
  # supervised tunnel apply + the `hooks` DNS CNAME (dns-records.sh). The route also works behind the
  # existing onprem-console host; this dedicated host is just for a clean public webhook URL.
  - hostname: hooks.getoffgridai.co
    service: http://127.0.0.1:80
  # PENDING (per-tenant gateway URLs): a per-tenant provisioned gateway is
  # "<slug5><rand5>-gateway.getoffgridai.co" and must route to the aggregator on :8800 — add a
  # MORE-SPECIFIC rule ABOVE the wildcard, e.g.  - hostname: "*-gateway.getoffgridai.co" → :8800.
  # Verify cloudflared supports the leading-wildcard pattern before relying on it; the aggregator
  # must then resolve the tenant from the Host. Deferred: public-tunnel surgery (supervised).
  # Wildcard: every other subdomain (incl. tenant consoles) → the console; tenant resolved by Host.
  - hostname: "*.getoffgridai.co"
    service: http://127.0.0.1:3000
  - service: http_status:404

# NOTE (cloudflared fragility — 2026-07-08): the tunnel had TWO `cloudflared tunnel run` replicas
# for the same tunnel id; one started before a config update and served a STALE config without the
# wildcard, so tenant subdomains 404'd on ~half of requests (Cloudflare round-robins replicas).
# FIX: keep exactly ONE replica. `pgrep -fl "cloudflared tunnel .* run"` → kill the stale one; the
# survivor keeps the tunnel up (no downtime). To reload config: edit ~/.cloudflared/config.yml,
# `cloudflared tunnel ingress validate`, then restart the single replica. It is NOT launchd-managed.
