# Off Grid — REAL enterprise data sources (for connectors / Studio, replacing synthetic data).
# Runs on S1's existing OrbStack (daemon already initialised — no GUI first-run). S1 is Apple
# Silicon, so images are ARM-compatible (MSSQL uses azure-sql-edge; Kafka uses Redpanda).
# Snowflake/Databricks aren't self-hostable → MinIO+DuckDB is the warehouse stand-in.
#
#   deploy:  /Users/admin/.orbstack/bin/docker compose -f data-sources.yml up -d
name: offgrid-data-sources

services:
  # ── Core Banking (Postgres OLTP) — customers, policies, claims, transactions ──
  corebank:
    image: postgres:16-alpine
    container_name: offgrid-ds-corebank
    restart: unless-stopped
    environment:
      POSTGRES_USER: corebank
      POSTGRES_PASSWORD: corebank
      POSTGRES_DB: corebank
    ports: ['5433:5432']
    volumes:
      - corebank:/var/lib/postgresql/data
      - ./seed-corebank.sql:/docker-entrypoint-initdb.d/01-seed.sql:ro

  # ── Policy Admin (MySQL) — agents, branches, commissions ──
  policyadmin:
    image: mysql:8
    container_name: offgrid-ds-policyadmin
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: policyadmin
      MYSQL_DATABASE: policyadmin
      MYSQL_USER: policyadmin
      MYSQL_PASSWORD: policyadmin
    ports: ['3307:3306']
    volumes:
      - policyadmin:/var/lib/mysql
      - ./seed-policyadmin.sql:/docker-entrypoint-initdb.d/01-seed.sql:ro

  # ── Finance ERP (MSSQL via Azure SQL Edge — ARM-compatible) — GL, invoices ──
  erp:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: offgrid-ds-erp
    restart: unless-stopped
    environment:
      ACCEPT_EULA: '1'
      MSSQL_SA_PASSWORD: 'Offgrid!Erp2026'
    ports: ['1433:1433']
    volumes: [erp:/var/opt/mssql]

  # ── Event stream (Redpanda — Kafka-compatible, single binary, ARM) — upstream events ──
  kafka:
    image: redpandadata/redpanda:v24.2.7
    container_name: offgrid-ds-kafka
    restart: unless-stopped
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://offgrid-ds-kafka:9092,external://127.0.0.1:19092
    ports: ['19092:19092', '9644:9644']
    volumes: [kafka:/var/lib/redpanda/data]

  # ── Warehouse object store (S3-compatible) — "Snowflake/Databricks" stand-in ──
  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: offgrid-ds-minio
    restart: unless-stopped
    command: server /data --console-address ":9011"
    environment:
      MINIO_ROOT_USER: offgrid
      MINIO_ROOT_PASSWORD: offgrid-warehouse
    ports: ['9010:9000', '9011:9011']
    volumes: [minio:/data]

  # ── CRM (mock Salesforce-style REST API) — accounts, opportunities, contacts ──
  crm:
    image: node:20-alpine
    container_name: offgrid-ds-crm
    restart: unless-stopped
    working_dir: /data
    command: ['sh', '-c', 'npx --yes json-server --host 0.0.0.0 --port 80 /data/crm.json']
    ports: ['8090:80']
    volumes:
      - ./crm.json:/data/crm.json:ro

volumes:
  corebank:
  policyadmin:
  erp:
  kafka:
  minio:
