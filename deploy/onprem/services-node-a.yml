# Off Grid on-prem OSS services — NODE A (offgrid-g4 / 192.168.1.63).
# Self-contained group: SIEM + workflows + lineage + vector + policy + secrets. Each service and
# its DB are co-located on THIS node, so all intra-group traffic stays on the local docker
# network — nothing crosses the LAN between containers (macOS containers can't reach LAN peers).
# The console (native on S1) reaches these via 192.168.1.63:<published port>.
#
#   deploy:  docker compose -f services-node-a.yml up -d
name: offgrid-services-a

services:
  # ── SIEM (audit/log search + dashboards) ──
  opensearch:
    image: opensearchproject/opensearch:2.18.0
    restart: unless-stopped
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: 'true'
      OPENSEARCH_JAVA_OPTS: '-Xms512m -Xmx512m'
      bootstrap.memory_lock: 'true'
    ulimits:
      memlock: { soft: -1, hard: -1 }
    ports: ['9200:9200']
    volumes: [opensearch:/usr/share/opensearch/data]
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.18.0
    restart: unless-stopped
    depends_on: [opensearch]
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: 'true'
    ports: ['5601:5601']

  # ── vector store (Brain server-scale retrieval) ──
  qdrant:
    image: qdrant/qdrant:v1.12.5
    restart: unless-stopped
    ports: ['6333:6333']
    volumes: [qdrant:/qdrant/storage]

  # ── policy-as-code ──
  opa:
    image: openpolicyagent/opa:0.70.0
    restart: unless-stopped
    command: ['run', '--server', '--addr=0.0.0.0:8181', '--log-level=error']
    ports: ['8181:8181']

  # ── secrets vault ──
  openbao:
    image: openbao/openbao:2.1.0
    restart: unless-stopped
    cap_add: [IPC_LOCK]
    environment:
      BAO_DEV_ROOT_TOKEN_ID: offgrid-dev-token
      BAO_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports: ['8200:8200']

  # ── durable workflows (agents) ──
  temporal-db:
    image: postgres:16.6-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes: [temporaldb:/var/lib/postgresql/data]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U temporal']
      interval: 5s
      timeout: 3s
      retries: 20
  temporal:
    image: temporalio/auto-setup:1.25.2
    restart: on-failure
    depends_on:
      temporal-db: { condition: service_healthy }
    environment:
      DB: postgres12
      DB_PORT: '5432'
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-db
    ports: ['7233:7233']
  temporal-ui:
    image: temporalio/ui:2.32.0
    restart: unless-stopped
    depends_on: [temporal]
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports: ['8081:8080']

  # ── data lineage (OpenLineage / Marquez) ──
  marquez-db:
    image: postgres:16.6-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
      POSTGRES_DB: marquez
    volumes: [marquezdb:/var/lib/postgresql/data]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U marquez']
      interval: 5s
      timeout: 3s
      retries: 20
  marquez:
    image: marquezproject/marquez:0.50.0
    restart: on-failure
    depends_on:
      marquez-db: { condition: service_healthy }
    environment:
      MARQUEZ_PORT: '5000'
      MARQUEZ_ADMIN_PORT: '5010'
      POSTGRES_HOST: marquez-db
      POSTGRES_PORT: '5432'
      POSTGRES_DB: marquez
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
    ports: ['9000:5000', '5010:5010']
  marquez-web:
    image: marquezproject/marquez-web:0.50.0
    restart: unless-stopped
    depends_on: [marquez]
    environment:
      MARQUEZ_HOST: marquez
      MARQUEZ_PORT: '5000'
      WEB_PORT: '3000'
    ports: ['3001:3000']

volumes:
  opensearch:
  qdrant:
  temporaldb:
  marquezdb:
