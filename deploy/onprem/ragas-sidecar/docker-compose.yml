# Off Grid on-prem — RAGAS sidecar (S1, 127.0.0.1).
# The console (native next start on :3000, same host) reaches it over loopback, so we bind
# 127.0.0.1:8002 ONLY — never exposed off-box. The gateway URL + auth arrive per-request in the
# POST body from the console; OFFGRID_GATEWAY_API_KEY here is the fallback key ragas forwards.
#   build + run:  docker compose -f docker-compose.yml up -d --build
#   logs:         docker compose -f docker-compose.yml logs -f
#   stop:         docker compose -f docker-compose.yml down
name: offgrid-ragas-sidecar

services:
  ragas:
    build: .
    image: offgrid-ragas-sidecar:latest
    container_name: offgrid-ragas
    restart: unless-stopped
    # Loopback-only: the console calls it at http://127.0.0.1:8002 on the same host.
    ports: ['127.0.0.1:8002:8002']
    environment:
      # Gateway key ragas forwards to the aggregator as a Bearer to run its judge LLM + embeddings.
      # The aggregator REJECTS the `offgrid-local` default with 401 → evals silently degrade to the
      # heuristic. Put the REAL key (same as console .env.local OFFGRID_GATEWAY_API_KEY) in a local
      # `.env` (gitignored; see .env.example) — compose auto-loads it. Default only for a smoke run.
      OFFGRID_GATEWAY_API_KEY: ${OFFGRID_GATEWAY_API_KEY:-offgrid-local}
    # Container talks to the gateway on the host (127.0.0.1:8800 on S1) — map host loopback in.
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8002/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
