# Off Grid Console — THE canonical OSS stack. One file, all five planes, profiled by capability.
# Variants (lean / enterprise / air-gapped) are derived from this — never hand-rolled separately.
#
#   docker compose --profile all up -d              # full 5-layer depth (everything below)
#   docker compose --profile data --profile ai up   # pick planes/capabilities à la carte
#
# Profiles map 1:1 to capabilities, so a deployment runs only what it licensed:
#   data · secrets · observability · guardrails · policy · identity · lineage · llmops · agents · ai
#
# The Off Grid AI Gateway is first-party and runs SEPARATELY (127.0.0.1:7878) — never in compose.
# FinOps/cost + token issuance + per-user/per-project usage are FIRST-PARTY console capabilities
# (we own the gateway), not containers. All images here are permissive (Apache-2.0 / MIT / MPL-2.0
# / BSD / PostgreSQL) — see ../LICENSES.md. Dev-mode creds below are NOT for production.
name: offgrid-console

# Shared Airbyte env matrix — matched to airbytehq/airbyte-platform v0.63.15 .env + docker-compose.
# Top-level x- extension so it's a valid anchor source (Compose rejects bare keys under `services:`).
# Anchored so server/worker/bootloader stay in lockstep. SECRET_PERSISTENCE + CONFIG_DATABASE_* +
# INTERNAL_API_HOST are the version-specific requirements the old hand-rolled set was missing
# (worker died: "requires a bean ConnectionFactory with qualifier @Named('local-secrets')").
x-airbyte-env: &airbyte-env
  DATABASE_USER: airbyte
  DATABASE_PASSWORD: airbyte
  DATABASE_URL: jdbc:postgresql://airbyte-db:5432/airbyte
  DATABASE_HOST: airbyte-db
  DATABASE_PORT: '5432'
  DATABASE_DB: airbyte
  # ONE DB for jobs + configs here; CONFIG_DATABASE_* mirror DATABASE_* (server/bootloader define
  # `config` + `jobs` jOOQ datasources from these).
  # SECRET_PERSISTENCE is DELIBERATELY NOT in this shared anchor — it is set per-service (server +
  # worker only) to TESTING_CONFIG_DB_TABLE, which registers the `local-secrets` jOOQ datasource
  # (built from DATABASE_*) that those two binaries require. The BOOTLOADER must NOT get it: with
  # TESTING_CONFIG_DB_TABLE the bootloader crashes (NoSuchBeanException DSLContext @Named('local-
  # secrets')), so it stays on the NO_OP default. This split mirrors airbyte's official compose.
  CONFIG_DATABASE_USER: airbyte
  CONFIG_DATABASE_PASSWORD: airbyte
  CONFIG_DATABASE_URL: jdbc:postgresql://airbyte-db:5432/airbyte
  # NOTE on the `local-secrets` datasource: LocalTestingSecretPersistence (SECRET_PERSISTENCE=
  # TESTING_CONFIG_DB_TABLE) needs a Micronaut Hikari datasource named `local-secrets`. It CANNOT be
  # supplied via env vars — Micronaut maps DATASOURCES_LOCAL_SECRETS_URL to `datasources.local.secrets.url`
  # (underscore→dot), producing a broken datasource named `local` ("No URL specified"). The hyphen in
  # `local-secrets` only survives as a JVM system property, so it's passed via JAVA_OPTS on the
  # server + worker services below (NOT here — the bootloader stays on NO_OP and must not build it).
  TEMPORAL_HOST: airbyte-temporal:7233
  INTERNAL_API_HOST: http://airbyte-server:8001
  WORKLOAD_API_HOST: http://airbyte-server:8001
  CONNECTOR_BUILDER_SERVER_API_HOST: http://airbyte-connector-builder-server:80
  WEBAPP_URL: http://localhost:8006/
  AIRBYTE_VERSION: 0.63.15
  DEPLOYMENT_MODE: OSS
  WORKSPACE_ROOT: /tmp/workspace
  WORKSPACE_DOCKER_MOUNT: airbyteworkspace
  LOCAL_ROOT: /tmp/airbyte_local
  LOCAL_DOCKER_MOUNT: /tmp/airbyte_local
  CONFIG_ROOT: /data
  TRACKING_STRATEGY: logging
  JOB_MAIN_CONTAINER_CPU_REQUEST: ''
  JOB_MAIN_CONTAINER_CPU_LIMIT: ''
  JOB_MAIN_CONTAINER_MEMORY_REQUEST: ''
  JOB_MAIN_CONTAINER_MEMORY_LIMIT: ''
  WORKER_ENVIRONMENT: docker
  LOG_LEVEL: INFO
  # Micronaut bean profile. The worker registers its activity/spec workers only under the
  # `control-plane` environment; without it registerGetSpec() throws NoSuchElementException at boot.
  MICRONAUT_ENVIRONMENTS: control-plane
  # 0.63.x unified storage layer — worker/server resolve ${STORAGE_TYPE} + ${STORAGE_BUCKET_*} at
  # boot (worker crashed: "Could not resolve placeholder ${STORAGE_TYPE}"). LOCAL keeps logs/state on
  # the mounted workspace volume (no S3 needed for this dev-parity set); bucket names are still
  # required as keys even for LOCAL.
  STORAGE_TYPE: LOCAL
  STORAGE_BUCKET_LOG: airbyte-storage
  STORAGE_BUCKET_STATE: airbyte-storage
  STORAGE_BUCKET_WORKLOAD_OUTPUT: airbyte-storage
  STORAGE_BUCKET_ACTIVITY_PAYLOAD: airbyte-storage
  # Flyway baseline versions the server's application.yml resolves at boot (server crashed:
  # "property ${airbyte.flyway.configs.minimum-migration-version} doesn't exist"). Values per
  # airbyte's official 0.63.x .env.
  CONFIGS_DATABASE_MINIMUM_FLYWAY_MIGRATION_VERSION: 0.40.23.002
  JOBS_DATABASE_MINIMUM_FLYWAY_MIGRATION_VERSION: 0.40.26.001

services:
  # ── DATA PLANE ────────────────────────────────────────────────────────────────
  # Postgres + pgvector: console state, append-only audit, AND the server-scale Brain vector store.
  postgres:
    image: pgvector/pgvector:0.8.0-pg16
    profiles: [data, ai, all]
    environment:
      POSTGRES_USER: offgrid
      POSTGRES_PASSWORD: offgrid
      POSTGRES_DB: offgrid_console
    ports: ['5432:5432']
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U offgrid']
      interval: 5s
      timeout: 3s
      retries: 12

  # Object store for documents/artifacts (S3-compatible, Apache-2.0).
  seaweedfs:
    image: chrislusf/seaweedfs:3.80
    profiles: [data, all]
    command: 'server -dir=/data -s3 -s3.port=8333'
    ports: ['8333:8333', '9333:9333']
    volumes: [seaweed:/data]

  # ── AI PLANE — vector store alternative (Brain bridge) ─────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.5
    profiles: [ai, all]
    ports: ['6333:6333']
    volumes: [qdrant:/qdrant/storage]

  # ── SECRETS ────────────────────────────────────────────────────────────────────
  # DEV/local convenience: in-memory, auto-unsealed, hardcoded root token. Use for `make secrets`
  # locally ONLY — secrets do NOT survive a restart. Profile `secrets-dev`.
  openbao-dev:
    image: openbao/openbao:2.1.0
    profiles: [secrets-dev]
    cap_add: [IPC_LOCK]
    environment:
      BAO_DEV_ROOT_TOKEN_ID: offgrid-dev-token
      BAO_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports: ['8200:8200']
    healthcheck:
      test: ['CMD', 'bao', 'status', '-address=http://127.0.0.1:8200']
      interval: 5s
      timeout: 3s
      retries: 12

  # PROD: PERSISTENT file storage — secrets survive restarts (fixes the audit P0). Comes up SEALED;
  # first boot needs `bao operator init` + unseal (SUPERVISED — see SERVER_STATE.md § OpenBao
  # persistence migration). Back up the openbao-data volume. Now the default `secrets`/`all` profile.
  openbao:
    image: openbao/openbao:2.1.0
    profiles: [secrets, all]
    cap_add: [IPC_LOCK]
    command: ['server', '-config=/openbao/config/config.hcl']
    environment:
      BAO_ADDR: http://127.0.0.1:8200
    volumes:
      - ./openbao/config.hcl:/openbao/config/config.hcl:ro
      - openbao-data:/openbao/data
    ports: ['8200:8200']
    healthcheck:
      # `initialized=true` once set up; sealed status is fine for the healthcheck (server is up).
      test: ['CMD', 'bao', 'status', '-address=http://127.0.0.1:8200']
      interval: 10s
      timeout: 3s
      retries: 12

  # ── IDENTITY (SSO) ──────────────────────────────────────────────────────────────
  # Keycloak dev mode (in-memory H2) — self-contained for local; back with Postgres in prod.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    profiles: [identity, all]
    # --import-realm re-imports keycloak/offgrid-realm.json on every boot, so the realm + client +
    # test user are deterministic and survive `make down` — no runtime setup script needed. (Dev
    # mode; for production use a real DB + secrets and remove the committed dev secret.)
    command: ['start-dev', '--import-realm']
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: offgrid-dev
      KC_HTTP_PORT: '8080'
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    ports: ['8080:8080']

  # ── POLICY (policy-as-code) ──────────────────────────────────────────────────────
  opa:
    image: openpolicyagent/opa:0.70.0
    profiles: [policy, all]
    command: ['run', '--server', '--addr=0.0.0.0:8181', '--log-level=error']
    # Stock OPA has ZERO auth — bind to loopback so only same-host next-server reaches it.
    ports: ['127.0.0.1:8181:8181']

  # ── GUARDRAILS (PII detection / redaction) ────────────────────────────────────────
  # Stock Presidio images have ZERO auth — bind to loopback so only same-host next-server
  # (OFFGRID_PRESIDIO_URL / _ANONYMIZER_URL) reaches them, never the LAN.
  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer:2.2.356
    profiles: [guardrails, all]
    ports: ['127.0.0.1:5002:3000']
  presidio-anonymizer:
    image: mcr.microsoft.com/presidio-anonymizer:2.2.356
    profiles: [guardrails, all]
    ports: ['127.0.0.1:5001:3000']

  # LLM Guard (Protect AI, MIT) — a NAMED alternative guardrails engine (scanner suite: Anonymize,
  # Secrets, Sensitive, Toxicity, Bias, BanTopics, PromptInjection, Language, Regex, TokenLimit).
  # Selected with OFFGRID_ADAPTER_GUARDRAILS=llm-guard; the console reaches it at
  # OFFGRID_HTTP_GUARDRAIL_URL (POST /analyze/prompt) with the AUTH_TOKEN as _API_KEY.
  #
  # Image note: the canonical DOCUMENTED image is `laiyer/llm-guard-api` (Laiyer → Protect AI; the
  # deploy docs were never re-tagged to a protectai image, and no ghcr image is published). Pinned to
  # 0.3.16, the latest published tag (pushed 2025-05-19). Heads-up: the upstream repo is ARCHIVED
  # (EOL) as of mid-2026 — it still runs, but factor that into any long-term dependency. Use the
  # `-cuda` variant for GPU. Health: GET /healthz (liveness) / /readyz (readiness). Loopback-bound so
  # only the same-host next-server reaches it — set AUTH_TOKEN in .env before exposing it anywhere.
  llm-guard:
    image: laiyer/llm-guard-api:0.3.16
    profiles: [guardrails, all]
    environment:
      - LOG_LEVEL=INFO
      - AUTH_TOKEN=${LLM_GUARD_AUTH_TOKEN:-change-me}
    ports: ['127.0.0.1:8000:8000']
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8000/healthz']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ── OBSERVABILITY (metrics/logs/traces — one OTLP wire, any backend) ───────────────
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.106.1
    profiles: [observability, all]
    command: ['-storageDataPath=/vmdata', '-httpListenAddr=:8428', '-retentionPeriod=1']
    ports: ['8428:8428']
    volumes: [vmdata:/vmdata]
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8428/health']
      interval: 5s
      timeout: 3s
      retries: 12
  victorialogs:
    image: victoriametrics/victoria-logs:v1.3.2-victorialogs
    profiles: [observability, all]
    command: ['-storageDataPath=/vldata', '-httpListenAddr=:9428']
    ports: ['9428:9428']
    volumes: [vldata:/vldata]
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.0
    profiles: [observability, all]
    command: ['--config=/etc/otelcol/config.yaml']
    volumes: ['./otel-collector.yaml:/etc/otelcol/config.yaml:ro']
    ports: ['4318:4318', '4317:4317']
    depends_on: [victoriametrics, jaeger]

  # LiteLLM Proxy — the model-door ROUTER. OpenAI-compatible, so it drops in behind the console's
  # GATEWAY_URL (set OFFGRID_GATEWAY_URL=http://litellm:4000 to cut over) and replaces the hand-rolled
  # aggregator with health-checked load-balancing, automatic failover/retries, per-key budgets + rate
  # limits, and structured request logging. It routes across the on-prem fleet nodes (192.168.1.x:7878)
  # AND the configured cloud providers. The mounted config.yaml is generated from the console's own
  # view of the fleet — see src/lib/litellm-config.ts (deploy/litellm-config.yaml is the committed
  # sample; regenerate it from the live pool). The aggregator (scripts/cluster-gateway.mjs) stays
  # available as a fallback until this is verified live.
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    profiles: [ai, all]
    command: ['--config', '/app/config.yaml', '--port', '4000', '--num_workers', '4']
    ports: ['4000:4000']
    volumes: ['./litellm-config.yaml:/app/config.yaml:ro']
    environment:
      # Master key gate for the management APIs (/model|/key|/health) the console Router view reads.
      OFFGRID_LITELLM_MASTER_KEY: ${OFFGRID_LITELLM_MASTER_KEY:-sk-litellm-dev-change-me}
      # Cloud provider keys resolved at runtime via os.environ/… refs in config.yaml (never committed).
      OFFGRID_CLOUD_OPENAI_API_KEY: ${OFFGRID_CLOUD_OPENAI_API_KEY:-}
      OFFGRID_CLOUD_ANTHROPIC_API_KEY: ${OFFGRID_CLOUD_ANTHROPIC_API_KEY:-}
      OFFGRID_CLOUD_DEEPSEEK_API_KEY: ${OFFGRID_CLOUD_DEEPSEEK_API_KEY:-}
      OFFGRID_CLOUD_ZHIPU_API_KEY: ${OFFGRID_CLOUD_ZHIPU_API_KEY:-}
      OFFGRID_CLOUD_COMPAT_API_KEY: ${OFFGRID_CLOUD_COMPAT_API_KEY:-}
      # Structured request logging → the same offgrid-gateway OpenSearch index the traffic/logs UI
      # reads (litellm-log-shape.ts maps the callback payload into the TrafficRecord shape).
      OFFGRID_OPENSEARCH_URL: ${OFFGRID_OPENSEARCH_URL:-http://opensearch:9200}
      OFFGRID_GATEWAY_INDEX: ${OFFGRID_GATEWAY_INDEX:-offgrid-gateway}
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4000/health/liveliness']
      interval: 15s
      timeout: 5s
      retries: 10

  # Distributed-trace backend (app-layer tracing): OTLP in → queryable trace UI on :16686.
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    profiles: [observability, all]
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports: ['16686:16686']

  # ── LLMOps (LLM tracing, evals, cost per trace/user/project) ──────────────────────
  langfuse-db:
    image: postgres:16.6-alpine
    profiles: [llmops, all]
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes: [langfusedb:/var/lib/postgresql/data]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U langfuse']
      interval: 5s
      timeout: 3s
      retries: 20
  # Langfuse v3 — split web + worker, backed by ClickHouse (analytics), MinIO (event blobs) and
  # Redis (queue), in addition to the Postgres above. v3 is what accepts OTLP traces directly
  # (POST /api/public/otel/v1/traces), so the console's span fan-out lands here. Heavier than v2
  # (4 extra containers) → scoped to the llmops/all profiles; `make smoke`/`down` are unaffected.
  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    profiles: [llmops, all]
    environment:
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    volumes:
      - clickhouse:/var/lib/clickhouse
      - clickhouselogs:/var/log/clickhouse-server
    healthcheck:
      test:
        ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://127.0.0.1:8123/ping || exit 1']
      interval: 5s
      timeout: 3s
      retries: 20
  langfuse-minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    profiles: [llmops, all]
    entrypoint: sh
    # pre-create the event bucket so Langfuse's S3 client finds it on first write
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    volumes: [langfuseminio:/data]
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 3s
      retries: 20
  langfuse-redis:
    image: redis:7.4-alpine
    profiles: [llmops, all]
    command: ['redis-server', '--maxmemory-policy', 'noeviction']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
  langfuse-worker:
    image: langfuse/langfuse-worker:3.30.0
    profiles: [llmops, all]
    restart: on-failure
    depends_on:
      langfuse-db: { condition: service_healthy }
      langfuse-clickhouse: { condition: service_healthy }
      langfuse-minio: { condition: service_healthy }
      langfuse-redis: { condition: service_healthy }
    environment: &langfuse-env
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      SALT: offgrid-dev-salt
      ENCRYPTION_KEY: 1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef
      TELEMETRY_ENABLED: 'false'
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_CLUSTER_ENABLED: 'false'
      REDIS_HOST: langfuse-redis
      REDIS_PORT: '6379'
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: 'true'
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
  langfuse:
    image: langfuse/langfuse:3.30.0
    profiles: [llmops, all]
    restart: on-failure
    depends_on:
      langfuse-worker: { condition: service_started }
      langfuse-db: { condition: service_healthy }
      langfuse-clickhouse: { condition: service_healthy }
      langfuse-minio: { condition: service_healthy }
      langfuse-redis: { condition: service_healthy }
    environment:
      <<: *langfuse-env
      NEXTAUTH_URL: http://localhost:3030
      NEXTAUTH_SECRET: offgrid-dev-secret
      # Headless bootstrap: create an org/project + a fixed API key pair on first boot, so the
      # OTLP auth header is known ahead of time (no manual click-through to get keys).
      LANGFUSE_INIT_ORG_ID: offgrid
      LANGFUSE_INIT_PROJECT_ID: console
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-offgrid-console
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-offgrid-console
      LANGFUSE_INIT_USER_EMAIL: dev@offgrid.local
      LANGFUSE_INIT_USER_PASSWORD: offgrid-dev-pw
      LANGFUSE_INIT_USER_NAME: Off Grid Dev
    ports: ['3030:3000']

  # ── LINEAGE & PROVENANCE (source → chunk → answer) ────────────────────────────────
  marquez-db:
    image: postgres:16.6-alpine
    profiles: [lineage, all]
    environment:
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
      POSTGRES_DB: marquez
    volumes: [marquezdb:/var/lib/postgresql/data]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U marquez']
      interval: 5s
      timeout: 3s
      retries: 20
  marquez:
    image: marquezproject/marquez:0.50.0
    profiles: [lineage, all]
    restart: on-failure
    depends_on:
      marquez-db:
        condition: service_healthy
    environment:
      MARQUEZ_PORT: '5000'
      MARQUEZ_ADMIN_PORT: '5010'
      POSTGRES_HOST: marquez-db
      POSTGRES_PORT: '5432'
      POSTGRES_DB: marquez
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
    # Stock Marquez has ZERO auth — bind to loopback so only same-host next-server reads it.
    # marquez-web reaches marquez over the internal Docker network (MARQUEZ_HOST), unaffected.
    ports: ['127.0.0.1:9000:5000', '127.0.0.1:5010:5010']
  marquez-web:
    image: marquezproject/marquez-web:0.50.0
    profiles: [lineage, all]
    depends_on: [marquez]
    environment:
      MARQUEZ_HOST: marquez
      MARQUEZ_PORT: '5000'
      WEB_PORT: '3000'
    ports: ['3001:3000']

  # ── AGENT RUNTIME (durable workflows) ─────────────────────────────────────────────
  temporal-db:
    image: postgres:16.6-alpine
    profiles: [agents, all]
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes: [temporaldb:/var/lib/postgresql/data]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U temporal']
      interval: 5s
      timeout: 3s
      retries: 20
  temporal:
    image: temporalio/auto-setup:1.25.2
    profiles: [agents, all]
    restart: on-failure
    depends_on:
      temporal-db:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: '5432'
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-db
    ports: ['7233:7233']
  temporal-ui:
    image: temporalio/ui:2.32.0
    profiles: [agents, all]
    depends_on: [temporal]
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports: ['8081:8080']

  # ── CACHING & RATE LIMITS (Redis: semantic/exact response cache + rate limiting) ──
  redis:
    image: redis:7.4-alpine
    profiles: [caching, all]
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    ports: ['6379:6379']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 12

  # ── SIEM (OpenSearch: audit/log search + dashboards) ──────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.18.0
    profiles: [siem, all]
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: 'true'
      OPENSEARCH_JAVA_OPTS: '-Xms512m -Xmx512m'
      bootstrap.memory_lock: 'true'
    ulimits:
      memlock: { soft: -1, hard: -1 }
    ports: ['9200:9200']
    volumes: [opensearch:/usr/share/opensearch/data]
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.18.0
    profiles: [siem, all]
    depends_on: [opensearch]
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: 'true'
    ports: ['5601:5601']

  # ── FEATURE FLAGS (Unleash: modular capability/module control) ────────────────────
  unleash-db:
    image: postgres:16.6-alpine
    profiles: [flags, all]
    environment:
      POSTGRES_USER: unleash
      POSTGRES_PASSWORD: unleash
      POSTGRES_DB: unleash
    volumes: [unleashdb:/var/lib/postgresql/data]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U unleash']
      interval: 5s
      timeout: 3s
      retries: 20
  unleash:
    image: unleashorg/unleash-server:6.6
    profiles: [flags, all]
    restart: on-failure
    depends_on:
      unleash-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://unleash:unleash@unleash-db:5432/unleash
      DATABASE_SSL: 'false'
    ports: ['4242:4242']

  # ── AGENT QA SIDECARS (Apache-2.0 Python wrappers for the eval/drift swap-ins) ────────
  # Thin services the console's `ragas` (evals) and `evidently` (drift) adapters call. Both run
  # their metrics through the on-device gateway; kept as sidecars so the console stays Node-only.
  evidently:
    build: ./sidecars/drift
    profiles: [qa, all]
    ports: ['8001:8001']
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request;urllib.request.urlopen(\"http://127.0.0.1:8001/\")"']
      interval: 10s
      timeout: 5s
      retries: 10
  ragas:
    build: ./sidecars/ragas
    profiles: [qa, all]
    ports: ['8002:8002']
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request;urllib.request.urlopen(\"http://127.0.0.1:8002/health\")"']
      interval: 10s
      timeout: 5s
      retries: 10

  # ── BI / DATA EXPLORATION (Apache Superset: view, SQL, pivot/transpose, dashboards) ──
  # First run: `docker compose exec superset superset init` (creates admin + metadata).
  superset:
    image: apache/superset:4.1.1
    profiles: [bi, all]
    environment:
      SUPERSET_SECRET_KEY: offgrid-dev-superset-secret
    ports: ['8088:8088']
    volumes: [superset:/app/superset_home]

  # ── MDM / FLEET CONTROL (FleetDM: osquery-based cross-platform device management) ──────
  # MIT-licensed Fleet Free. First run, create an admin + API token:
  #   docker compose exec fleet fleetctl setup --email a@b.co --password '...' --org-name OffGrid
  #   then `fleetctl login` + `fleetctl get api-token` → set OFFGRID_FLEET_TOKEN.
  fleet-mysql:
    image: mysql:8.0.40
    profiles: [mdm, all]
    environment:
      MYSQL_ROOT_PASSWORD: fleet
      MYSQL_DATABASE: fleet
      MYSQL_USER: fleet
      MYSQL_PASSWORD: fleet
    volumes: [fleetmysql:/var/lib/mysql]
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-ufleet', '-pfleet']
      interval: 5s
      timeout: 3s
      retries: 30
  fleet-redis:
    image: redis:7.4-alpine
    profiles: [mdm, all]
  fleet:
    image: fleetdm/fleet:v4.87.0
    profiles: [mdm, all]
    depends_on:
      fleet-mysql:
        condition: service_healthy
    command: sh -c "fleet prepare db --no-prompt && fleet serve"
    environment:
      FLEET_MYSQL_ADDRESS: fleet-mysql:3306
      FLEET_MYSQL_DATABASE: fleet
      FLEET_MYSQL_USERNAME: fleet
      FLEET_MYSQL_PASSWORD: fleet
      FLEET_REDIS_ADDRESS: fleet-redis:6379
      FLEET_SERVER_ADDRESS: 0.0.0.0:8070
      FLEET_SERVER_TLS: 'false'
      FLEET_LOGGING_JSON: 'true'
    ports: ['8070:8070']

  # ══ DATA PLANE (NEW — S2-only) ═════════════════════════════════════════════════════
  # The second substrate engine (the first is the model engine — the llama.cpp gateway fleet).
  # This is the DATA engine: warehouse + streaming + connectors/CDC + data-quality. It is heavy
  # (Airbyte alone is ~8 containers) and is intended to run on offgrid-s2 (16GB M1) under Colima,
  # NOT on S1 alongside the control plane. See onprem/DATA_PLANE.md for the S2 bringup runbook.
  # All images below are permissive-licensed (Apache-2.0 / MIT / ELv2* / BSD) — dev creds are NOT
  # for production. (*Redpanda core is BSL/permissive-for-single-node dev use; swap for a licensed
  # broker or Apache Kafka in production if that matters to you.)

  # ── WAREHOUSE (ClickHouse — columnar analytics store; what BI/PowerBI reads) ────────
  # STANDALONE and DISTINCT from the langfuse-clickhouse above (that one is llmops-internal).
  # Own service name, own volume, own ports (8124/9001) so the two never collide.
  warehouse-clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    profiles: [warehouse, all]
    environment:
      CLICKHOUSE_USER: warehouse
      CLICKHOUSE_PASSWORD: warehouse # DEV ONLY — not for production
      CLICKHOUSE_DB: offgrid_warehouse
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    # HTTP 8124 (native SQL over HTTP; what dbt / BI point at) + native TCP 9001. Ports are shifted
    # off ClickHouse defaults (8123/9000) so they don't clash with langfuse-clickhouse or Marquez.
    ports: ['8124:8123', '9001:9000']
    volumes:
      - warehouseclickhouse:/var/lib/clickhouse
      - warehouseclickhouselogs:/var/log/clickhouse-server
    healthcheck:
      test:
        ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://127.0.0.1:8123/ping || exit 1']
      interval: 5s
      timeout: 3s
      retries: 20

  # ── STREAMING / MQ (Redpanda — Kafka-API broker, single container, lighter than Kafka) ──
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    profiles: [streaming, all]
    command:
      - redpanda
      - start
      - --smp=1 # 1 core — keep S2 footprint small
      - --memory=1G # bounded so it co-exists with Airbyte + ClickHouse on 16GB
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      # Kafka API on 9092 (internal) + 19092 (host); admin 9644; Schema Registry 8081.
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://127.0.0.1:19092
      - --schema-registry-addr=0.0.0.0:8081
    ports:
      - '19092:19092' # Kafka API (external)
      - '9644:9644' # admin API / metrics
      - '18083:8081' # schema registry
    volumes: [redpanda:/var/lib/redpanda/data]
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'rpk cluster health | grep -q "Healthy:.*true" && curl --fail --silent --show-error http://127.0.0.1:8081/subjects >/dev/null',
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  # ── CONNECTORS + CDC (Airbyte OSS — the ELT engine, 300+ connectors + Debezium CDC) ──
  # HONEST: Airbyte is inherently multi-container. This is the minimal viable OSS set — its own
  # Postgres + Temporal + server + worker + webapp + connector-builder (~8 containers incl. deps).
  # It is HEAVY (~4–6GB RAM working set) and S2-ONLY. In production the vendor-recommended install
  # is `abctl` (a k3d/kind cluster); this compose set is the lean dev-parity path. Landing/lake zone
  # for extracted data is the EXISTING SeaweedFS S3 (see note below) — no separate object store here.
  airbyte-db:
    image: postgres:16.6-alpine
    profiles: [etl, all]
    environment:
      POSTGRES_USER: airbyte
      POSTGRES_PASSWORD: airbyte # DEV ONLY — not for production
      POSTGRES_DB: airbyte
    volumes: [airbytedb:/var/lib/postgresql/data]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U airbyte']
      interval: 5s
      timeout: 3s
      retries: 20
  # Bootloader runs the Flyway DB migrations + connector-catalog seed, then exits. Server/worker
  # MUST wait for it (service_completed_successfully) — without it the schema is absent and they die.
  airbyte-bootloader:
    image: airbyte/bootloader:0.63.15
    profiles: [etl, all]
    restart: on-failure
    depends_on:
      airbyte-db: { condition: service_healthy }
    environment:
      <<: *airbyte-env

  # Airbyte runs its own Temporal (workflow engine for sync jobs) — SEPARATE from the agents-profile
  # `temporal` above (different DB, different network role). Airbyte auto-creates its schema.
  # v0.63.15 requires the dynamicconfig file mounted at config/dynamicconfig/development.yaml — the
  # old `development-sql.yaml` path does not exist in this image (crash: "no such file or directory").
  airbyte-temporal:
    image: temporalio/auto-setup:1.23.1
    profiles: [etl, all]
    restart: on-failure
    depends_on:
      airbyte-db: { condition: service_healthy }
    environment:
      DB: postgresql
      DB_PORT: '5432'
      POSTGRES_USER: airbyte
      POSTGRES_PWD: airbyte
      POSTGRES_SEEDS: airbyte-db
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development.yaml
    volumes:
      - ./airbyte/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig
  airbyte-server:
    image: airbyte/server:0.63.15
    profiles: [etl, all]
    restart: on-failure
    depends_on:
      airbyte-db: { condition: service_healthy }
      airbyte-bootloader: { condition: service_completed_successfully }
      airbyte-temporal: { condition: service_started }
    environment:
      <<: *airbyte-env
      SECRET_PERSISTENCE: TESTING_CONFIG_DB_TABLE
      # Defines the hyphenated `local-secrets` Hikari datasource that TESTING_CONFIG_DB_TABLE needs
      # (env vars can't express the hyphen — see the anchor note). Points at the same airbyte DB.
      # Use JDK_JAVA_OPTIONS (JVM APPENDS it) NOT JAVA_OPTS — JAVA_OPTS would REPLACE the image's
      # baked JVM opts and break the server's Flyway property resolution at boot.
      JDK_JAVA_OPTIONS: >-
        -Ddatasources.local-secrets.url=jdbc:postgresql://airbyte-db:5432/airbyte
        -Ddatasources.local-secrets.username=airbyte
        -Ddatasources.local-secrets.password=airbyte
        -Ddatasources.local-secrets.driver-class-name=org.postgresql.Driver
    ports: ['8005:8001'] # internal API (webapp proxies to it)
    volumes:
      - airbyteworkspace:/tmp/workspace
      - airbytedata:/data
  airbyte-worker:
    image: airbyte/worker:0.63.15
    profiles: [etl, all]
    restart: on-failure
    depends_on:
      airbyte-bootloader: { condition: service_completed_successfully }
      airbyte-server: { condition: service_started }
      airbyte-temporal: { condition: service_started }
    environment:
      # The worker launches connector containers, so it needs the host Docker socket (S2 OrbStack).
      <<: *airbyte-env
      SECRET_PERSISTENCE: TESTING_CONFIG_DB_TABLE
      # Defines the hyphenated `local-secrets` Hikari datasource (see server + anchor notes).
      # JDK_JAVA_OPTIONS (appended by the JVM) — never JAVA_OPTS, which replaces the image defaults.
      JDK_JAVA_OPTIONS: >-
        -Ddatasources.local-secrets.url=jdbc:postgresql://airbyte-db:5432/airbyte
        -Ddatasources.local-secrets.username=airbyte
        -Ddatasources.local-secrets.password=airbyte
        -Ddatasources.local-secrets.driver-class-name=org.postgresql.Driver
    volumes:
      - airbyteworkspace:/tmp/workspace
      - airbytedata:/data
      - /var/run/docker.sock:/var/run/docker.sock
  airbyte-webapp:
    image: airbyte/webapp:0.63.15
    profiles: [etl, all]
    restart: on-failure
    depends_on:
      airbyte-server: { condition: service_started }
    environment:
      # v0.63.15 nginx template interpolates AIRBYTE_SERVER_HOST + CONNECTOR_BUILDER_API_HOST +
      # KEYCLOAK_INTERNAL_HOST (NOT INTERNAL_API_HOST). Any missing ⇒ nginx "host not found in
      # upstream". Keycloak isn't deployed in this OSS set, so point it at localhost (the default in
      # airbyte's own compose) — the /auth upstream is simply never hit.
      AIRBYTE_SERVER_HOST: airbyte-server:8001
      CONNECTOR_BUILDER_API_HOST: airbyte-connector-builder-server:80
      KEYCLOAK_INTERNAL_HOST: localhost
    ports: ['8006:8080'] # 0.63.15 webapp nginx listens on 8080 (NOT 80). Airbyte UI → OFFGRID_AIRBYTE_URL=http://<s2>:8006
  airbyte-connector-builder-server:
    image: airbyte/connector-builder-server:0.63.15
    profiles: [etl, all]
    restart: on-failure
    depends_on:
      airbyte-server: { condition: service_started }

  # ── DATA-LAKE LANDING ZONE ──────────────────────────────────────────────────────────
  # NOTE: no new object store here BY DESIGN. The lake landing/staging zone is the EXISTING
  # `seaweedfs` service (S3-compatible, :8333) under the `data` profile. Airbyte's S3 destination
  # points at it (bucket `offgrid-lake`, endpoint http://<s2-or-s1>:8333, path-style). Only add a
  # dedicated MinIO if a connector strictly needs an isolated bucket namespace — prefer SeaweedFS.

  # ── DATA QUALITY (Great Expectations sidecar — mirrors the evidently/ragas sidecar pattern) ──
  # Thin Apache-2.0 service the console's data-quality adapter calls; runs GE checkpoints against a
  # supplied dataset (or a warehouse-clickhouse query result) and returns pass/fail + failed rules.
  great-expectations:
    build: ./sidecars/great-expectations
    profiles: [dataquality, all]
    ports: ['8003:8003']
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request;urllib.request.urlopen(\"http://127.0.0.1:8003/\")"']
      interval: 10s
      timeout: 5s
      retries: 10

  # ── ETL / orchestration engine (Kestra) — the visual pipeline + custom-code + trigger engine.
  # Governed behind the console's pipeline contract; surfaced in the Data tab in product language
  # ("Data movement / ETL orchestration" — never "Kestra" in the UI). Runs on S2 with the data plane.
  kestra-postgres:
    image: postgres:16.6-alpine
    profiles: [kestra, all]
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: kestra
    volumes: [kestradb:/var/lib/postgresql/data]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kestra -d kestra']
      interval: 10s
      timeout: 5s
      retries: 10
  kestra:
    image: kestra/kestra:latest  # TODO pin by digest once pulled with a manifest
    profiles: [kestra, all]
    restart: unless-stopped
    user: root
    command: server standalone
    depends_on:
      kestra-postgres:
        condition: service_healthy
    volumes:
      - kestradata:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock  # so Docker-task (custom code) nodes can run
      - /tmp/kestra-wd:/tmp/kestra-wd
    environment:
      # JVM capped so it co-exists with Airbyte/ClickHouse on the 16GB S2 box.
      JAVA_OPTS: '-Xmx1200m'
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://kestra-postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: kestra
        kestra:
          server:
            # Kestra OSS 0.24+ REQUIRES basic auth (the `enabled` flag is ignored). Username must be a
            # valid email. These are DEMO credentials on the demo box (recorded in fleet SECRET_INVENTORY);
            # the console's Kestra adapter authenticates the API with them.
            basicAuth:
              username: admin@offgrid.local
              password: OffGridKestra2026
          repository:
            type: postgres
          storage:
            type: local
            local:
              basePath: /app/storage
          queue:
            type: postgres
          tasks:
            tmpDir:
              path: /tmp/kestra-wd
          url: http://localhost:8090/
    ports: ['8090:8080'] # Kestra UI/API :8080 → host 8090 (edge loopback 8945 → this)
    healthcheck:
      # The image has Bash but no curl/wget. Probe the in-container API listener so a running JVM
      # whose HTTP server failed to start cannot be reported healthy through Docker's host proxy.
      test: ['CMD-SHELL', 'bash -c "</dev/tcp/127.0.0.1/8080"']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  pgdata:
  openbao-data: # OpenBao persistent secret store (prod file storage) — INCLUDE IN BACKUPS.
  seaweed:
  qdrant:
  vmdata:
  vldata:
  langfusedb:
  clickhouse:
  clickhouselogs:
  langfuseminio:
  marquezdb:
  temporaldb:
  opensearch:
  unleashdb:
  superset:
  fleetmysql:
  # ── data-plane (S2) volumes ──
  warehouseclickhouse:
  warehouseclickhouselogs:
  redpanda:
  airbytedb:
  airbyteworkspace:
  airbytedata:
  kestradb:
  kestradata:
