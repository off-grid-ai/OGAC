# Off Grid AI — LiteLLM Proxy config (SAMPLE, generated).
#
# This file is GENERATED from the console's own view of the fleet by src/lib/litellm-config.ts
# (buildLiteLLMConfig → configToYaml) — the single source of truth. Do NOT hand-edit the model_list:
# regenerate it from the live pool so it never drifts from scripts/fleet-pool.mjs + cloud-providers.ts:
#
#   node --experimental-strip-types --input-type=module -e "\
#     import { buildLiteLLMConfig, configToYaml } from './src/lib/litellm-config.ts';\
#     process.stdout.write(configToYaml(buildLiteLLMConfig({ databaseUrlEnvVar: 'OFFGRID_LITELLM_DB_URL' })));"\
#     > deploy/litellm-config.yaml
#
# Secrets are NEVER written here — api_key values are os.environ/… references LiteLLM resolves at
# runtime from the container env (see the `litellm` service in docker-compose.yml). The fleet nodes
# need no key. This sample carries the 8 on-prem nodes only; cloud deployments appear when the
# matching OFFGRID_CLOUD_*_API_KEY is set and the config is regenerated.
#
# LiteLLM is OpenAI-compatible, so pointing OFFGRID_GATEWAY_URL at http://litellm:4000 cuts the
# console over with NO routing-logic change. The hand-rolled aggregator stays available as a fallback.
