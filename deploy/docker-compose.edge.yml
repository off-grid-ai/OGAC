# One-IP edge proxy. Fronts the Console (UI + /api) and the Gateway (OpenAI-compatible /v1)
# behind a single address, so everyone on the office WiFi uses one URL.
# Brought up by ./setup.sh, which generates the Caddyfile next to this file.
services:
  edge:
    image: caddy:2.8-alpine
    container_name: offgrid-edge
    restart: unless-stopped
    ports:
      - "${OFFGRID_PUBLIC_PORT:-80}:${OFFGRID_PUBLIC_PORT:-80}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    extra_hosts:
      # lets the container reach a Console running with `next start` on the host
      - "host.docker.internal:host-gateway"
