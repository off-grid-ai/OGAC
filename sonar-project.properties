sonar.projectKey=off-grid-ai_console
sonar.organization=off-grid-ai
sonar.projectName=Off Grid AI Console

# Analyze the app source + the pure-logic tests; exclude vendored packages, build output,
# generated code, screenshots, and infra glue (verified by build/integration, not unit-analyzable).
sonar.sources=src
sonar.tests=test
sonar.exclusions=packages/**,public/**,.next/**,coverage/**,node_modules/**,drizzle/**,scripts/**,deploy/**,**/*.d.ts
sonar.test.inclusions=test/**/*.test.ts,test/**/*.test.tsx

# Coverage (c8 emits lcov to coverage/lcov.info in CI).
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.sourceEncoding=UTF-8
