name: CI

# The same gate the pre-push hook enforces locally, now enforced in CI on every push + PR:
# typecheck, tests, coverage >= 85% on all of statements/branches/functions/lines/conditions
# (c8 --check-coverage, thresholds in .c8rc.json), and a clean production build.
# A push/PR that drops below the bar fails here, not just on a developer's machine.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout console
        uses: actions/checkout@v4
        with:
          path: console

      # The @offgrid/* packages are vendored in-repo under console/packages/ (with prebuilt
      # dist), so `npm ci` resolves the file: deps locally — no private-repo checkout needed.
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: console/package-lock.json

      - name: Install console deps
        working-directory: console
        run: npm ci

      - name: Typecheck
        working-directory: console
        run: npm run typecheck

      - name: Tests + coverage gate (>=85% all dimensions, enforced)
        working-directory: console
        run: npm run coverage:check

      # Static architecture gate: fails on any ERROR-level dependency-cruiser
      # violation — above all an eager-value circular import (the Node-22-only
      # TDZ prod-build crash class). WARN findings (type-only cycles, orphans)
      # are advisory and do not fail the job. Ruleset: .dependency-cruiser.js.
      - name: Dependency-cruiser gate (no circular imports / boundary breaks)
        working-directory: console
        run: npm run depcruise

      # DRY gate: fails only when code duplication exceeds the ratcheting
      # threshold in .jscpd.json — mechanically enforcing CLAUDE.md hygiene §C
      # ("duplicated logic that drifts is a defect"). Baseline-then-ratchet:
      # the threshold sits just above the real baseline and is ratcheted DOWN
      # as G-CPD-* clones are extracted (see docs/GAPS_BACKLOG.md).
      - name: jscpd DRY gate (code duplication under threshold)
        working-directory: console
        run: npm run jscpd

      - name: Production build
        working-directory: console
        run: npm run build
